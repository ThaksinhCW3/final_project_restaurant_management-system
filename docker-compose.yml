services:
  # 1. The Database Service
  db:
    image: mysql:8.0
    container_name: restaurant_db_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: restaurant_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  # phpmyadmin service to manage the database
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    restart: always
    ports: 
    - 8080:80
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    depends_on:
      - db

  # 2. The Backend API Service
  backend:
    build: ./backend
    container_name: restaurant_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=restaurant_db
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - db

  # 3. The Frontend Service
  frontend:
    build: ./frontend
    container_name: restaurant_frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  db_data: